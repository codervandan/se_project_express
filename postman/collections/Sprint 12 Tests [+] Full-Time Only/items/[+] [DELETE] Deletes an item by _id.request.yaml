$kind: http-request
url: "{{base_url}}/items/:id"
method: DELETE
pathVariables:
  id: "{{item_id}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code should be 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });"
    language: text/javascript
  - type: beforeRequest
    code: |
      const obj = {
        name: pm.collectionVariables.get("item_name"),
        weather: pm.collectionVariables.get("item_weather"),
        imageUrl: pm.collectionVariables.get("item_imageUrl"),
      };

      const createItemReqOpts = {
        url: `${pm.collectionVariables.get("base_url")}/items`,
        method: "POST",
        header: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify(obj),
      };

      pm.sendRequest(createItemReqOpts, function (error, response) {
        pm.test("Preliminary POST /items request should be successful", () => {
          pm.expect(response.code).to.be.oneOf([200, 201]);
        });

        try {
          if (response.json()) {
            const item = response.json();
            pm.collectionVariables.set("item_id", item._id);
          }
        } catch (e) {}
      });
    language: text/javascript
order: 6000
